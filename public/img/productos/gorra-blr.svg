<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Sombra suave -->
  <ellipse cx="250" cy="390" rx="160" ry="18" fill="rgba(0,0,0,0.25)"></ellipse>

  <!-- Visera -->
  <path d="M90,295 Q100,340 145,355 Q200,368 250,368 Q300,368 355,355 Q400,340 410,295 Z" fill="#2d5a2d"></path>
  <!-- Borde visera inferior -->
  <path d="M90,295 Q100,340 145,355 Q200,368 250,368 Q300,368 355,355 Q400,340 410,295" fill="none" stroke="#1a3a1a" stroke-width="3"></path>
  <!-- Costuras visera -->
  <path d="M130,310 Q200,355 250,357 Q300,355 370,310" fill="none" stroke="#3A6B35" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"></path>

  <!-- Cuerpo principal de la gorra -->
  <path d="M100,285 Q95,200 120,155 Q160,95 250,88 Q340,95 380,155 Q405,200 400,285 Z" fill="#3A6B35"></path>

  <!-- Panel frontal (más claro) -->
  <path d="M175,285 Q170,190 185,150 Q210,105 250,100 Q290,105 315,150 Q330,190 325,285 Z" fill="#4a8040"></path>

  <!-- Costuras entre paneles -->
  <line x1="175" y1="285" x2="185" y2="150" stroke="#2d5a2d" stroke-width="1.5"></line>
  <line x1="325" y1="285" x2="315" y2="150" stroke="#2d5a2d" stroke-width="1.5"></line>
  <path d="M100,285 Q110,250 130,210 Q150,175 175,158" fill="none" stroke="#2d5a2d" stroke-width="1.5"></path>
  <path d="M400,285 Q390,250 370,210 Q350,175 325,158" fill="none" stroke="#2d5a2d" stroke-width="1.5"></path>

  <!-- Botón superior -->
  <circle cx="250" cy="97" r="14" fill="#1a3a1a"></circle>
  <circle cx="250" cy="97" r="9" fill="#D9C8A1"></circle>
  <circle cx="250" cy="97" r="4" fill="#3A6B35"></circle>

  <!-- Banda interior (frente) -->
  <path d="M100,285 Q250,298 400,285 Q395,275 250,288 Q105,275 100,285 Z" fill="#1a3a1a" opacity="0.6"></path>

  <!-- === LOGO BLR ZOO BORDADO === -->
  <g transform="translate(250, 205)">
    <!-- Fondo del parche -->
    <ellipse cx="0" cy="0" rx="52" ry="48" fill="#1a3a1a" opacity="0.5"></ellipse>

    <!-- Texto BLR -->
    <text x="0" y="-8" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#D9C8A1" letter-spacing="3">BLR</text>

    <!-- Línea separadora -->
    <line x1="-35" y1="2" x2="35" y2="2" stroke="#D9C8A1" stroke-width="1.2" opacity="0.6"></line>

    <!-- Texto ZOO -->
    <text x="0" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#D9C8A1" letter-spacing="5">ZOO</text>
  </g>

  <!-- Hebilla ajuste trasera -->
  <rect x="218" y="358" width="64" height="14" rx="7" fill="#1a3a1a"></rect>
  <rect x="228" y="361" width="20" height="8" rx="3" fill="#D9C8A1" opacity="0.5"></rect>
  <rect x="252" y="361" width="20" height="8" rx="3" fill="#D9C8A1" opacity="0.5"></rect>
  <rect x="240" y="359" width="3" height="12" rx="1.5" fill="#D9C8A1"></rect>

  <!-- Reflejo tela (brillo superior) -->
  <path d="M200,120 Q230,108 260,112" fill="none" stroke="white" stroke-width="2" opacity="0.15" stroke-linecap="round"></path>

</svg>